<svg viewBox="0 0 64 120" width="64" height="120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="reflect">
  <title>reflect</title>
  <defs>
    <!-- shears: pruning down to what's worth keeping -->
    <g id="mark" fill="none" stroke="#C2673F" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14 9 L32 31 L44 49" />
      <path d="M50 9 L32 31 L20 49" />
      <circle cx="16" cy="52" r="7" />
      <circle cx="48" cy="52" r="7" />
    </g>
  </defs>

  <use href="#mark" />
  <circle cx="32" cy="31" r="3" fill="#C2673F" />

  <!-- waterline -->
  <line x1="9" y1="62" x2="55" y2="62" stroke="#C2673F" stroke-width="1" opacity="0.25" />

  <!-- reflection: the mark mirrored below the line -->
  <g opacity="0.28" transform="matrix(1,0,0,-1,0,124)">
    <use href="#mark" />
    <circle cx="32" cy="31" r="3" fill="#C2673F" />
  </g>
</svg>
